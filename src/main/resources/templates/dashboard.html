<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Nongkrong Finder</title>

    <link rel="stylesheet" href="/css/style.css">

</head>
<body>

<div class="navbar">

    <a href="/dashboard">Dashboard</a>

    <a href="/tempat">Tempat</a>

    <a href="/favorit">Favorit</a>

    <a href="/event">Event</a>

    <a href="/logout">Logout</a>

</div>

<div class="container">

    <div class="hero">

        <h1>☕ Nongkrong Finder</h1>

        <p>
            Temukan tempat nongkrong terbaik,
            simpan favorit,
            berikan review,
            dan ikuti event menarik di sekitarmu.
        </p>

    </div>

    <br>

    <div class="card">

        <h2>📊 Statistik Aplikasi</h2>

        <br>

        <div style="display:flex; gap:20px; flex-wrap:wrap;">

            <div style="
                background:#f8f9fa;
                padding:20px;
                border-radius:10px;
                width:180px;
                text-align:center;
            ">

                <h3>☕ Tempat</h3>

                <h1 th:text="${jumlahTempat}"></h1>

            </div>

            <div style="
                background:#f8f9fa;
                padding:20px;
                border-radius:10px;
                width:180px;
                text-align:center;
            ">

                <h3>❤️ Favorit</h3>

                <h1 th:text="${jumlahFavorit}"></h1>

            </div>

            <div style="
                background:#f8f9fa;
                padding:20px;
                border-radius:10px;
                width:180px;
                text-align:center;
            ">

                <h3>🎉 Event</h3>

                <h1 th:text="${jumlahEvent}"></h1>

            </div>

            <div style="
                background:#f8f9fa;
                padding:20px;
                border-radius:10px;
                width:180px;
                text-align:center;
            ">

                <h3>⭐ Review</h3>

                <h1 th:text="${jumlahReview}"></h1>

            </div>

        </div>

    </div>

    <br>

    <div class="card">

        <h2>⚡ Akses Cepat</h2>

        <br>

        <a class="btn" href="/tempat">
            ☕ Kelola Tempat
        </a>

        &nbsp;

        <a class="btn" href="/favorit">
            ❤️ Favorit Saya
        </a>

        &nbsp;

        <a class="btn" href="/event">
            🎉 Kelola Event
        </a>

    </div>

</div>

</body>
</html>
