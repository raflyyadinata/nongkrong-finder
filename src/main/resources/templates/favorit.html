<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Favorit Saya</title>

    <link rel="stylesheet" href="/css/style.css">

</head>
<body>

<div class="navbar">

    <a href="/dashboard">Dashboard</a>

    <a href="/tempat">Tempat</a>

    <a href="/favorit">Favorit</a>

    <a href="/event">Event</a>

</div>

<div class="container">

    <div class="card">

        <h1 class="title">
            ❤️ Favorit Saya
        </h1>

        <table>

            <tr>
                <th>ID</th>
                <th>Nama Tempat</th>
                <th>Alamat</th>
                <th>Aksi</th>
            </tr>

            <tr th:each="favorit : ${favoritList}">

                <td th:text="${favorit.id_favorit}"></td>

                <td th:text="${favorit.tempat.nama_tempat}"></td>

                <td th:text="${favorit.tempat.alamat}"></td>

                <td>

                    <a th:href="@{'/favorit/hapus/' + ${favorit.id_favorit}}">
                        Hapus
                    </a>

                </td>

            </tr>

        </table>

    </div>

</div>

</body>
</html>
