<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorit Saya - NongkrongFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- NAVBAR -->
    <nav
    class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100"
  >
    <div
      class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center"
    >
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div
          class="bg-amber-500 text-white p-2.5 rounded-xl shadow-lg shadow-amber-500/20"
        >
          <i class="fa-solid fa-mug-hot text-xl"></i>
        </div>

        <span class="text-xl font-bold tracking-tight text-gray-900">
          Nongkrong<span class="text-amber-500">Finder</span>
        </span>
      </div>

      <!-- Menu -->
      <div
        class="hidden md:flex items-center gap-8 font-medium text-gray-600"
      >
        <a href="/dashboard" class="hover:text-amber-500 transition-colors">
          Dashboard
        </a>

        <a href="/tempat" class="hover:text-amber-500 transition-colors">
          Tempat
        </a>

        <a href="/event" class="hover:text-amber-500 transition-colors">
          Event
        </a>

        <!-- Hanya tampil jika sudah login -->
        <a
          th:if="${session.user != null}"
          href="/favorit"
          class="text-amber-500 transition-colors"
        >
          Favorit
        </a>

        <!-- Hanya Admin -->
        <div th:if="${session.role == 'ADMIN'}"
        class="relative group">
   
       <button
           class="hover:text-amber-500 transition-colors flex items-center gap-2">
   
           Kelola
   
           <i class="fa-solid fa-chevron-down text-xs"></i>
   
       </button>
   
       <div
           class="absolute top-full left-0 w-52 bg-white rounded-xl shadow-lg border border-gray-100 hidden group-hover:block z-50">
   
           <a href="/admin/user"
              class="block px-4 py-3 hover:bg-gray-50 text-sm">
               👥 Kelola User
           </a>
   
           <a href="/admin/tempat"
              class="block px-4 py-3 hover:bg-gray-50 text-sm">
               ☕ Kelola Tempat
           </a>
   
           <a href="/admin/event"
              class="block px-4 py-3 hover:bg-gray-50 text-sm">
               🎉 Kelola Event
           </a>
   
       </div>
   
   </div>
      </div>

      <!-- Tombol Kanan -->
      <div class="flex items-center gap-3">
        <!-- Guest -->
        <div th:if="${session.user == null}" class="flex gap-3">
          <a
            href="/login"
            class="bg-amber-500 text-white px-5 py-2.5 rounded-xl font-semibold hover:bg-amber-600 transition-all text-sm"
          >
            Login
          </a>

          <a
            href="/register"
            class="border border-gray-300 px-5 py-2.5 rounded-xl font-semibold hover:bg-gray-100 transition-all text-sm"
          >
            Register
          </a>
        </div>

        <!-- User/Admin -->
        <div th:if="${session.user != null}" class="flex items-center gap-3">
          <span class="text-sm font-semibold text-gray-700">
            <span th:text="${session.user.nama}"></span>
          </span>

          <span
            th:if="${session.role == 'ADMIN'}"
            class="bg-red-500 text-white text-xs px-2 py-1 rounded-full"
          >
            ADMIN
          </span>

          <a
            href="/logout"
            class="bg-gray-900 text-white px-5 py-2.5 rounded-xl font-semibold hover:bg-gray-800 transition-all text-sm"
          >
            Logout
          </a>
        </div>
      </div>
    </div>
  </nav>

    <!-- MAIN BODY -->
    <main class="max-w-5xl mx-auto px-4 py-10">
        <div class="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden">
            
            <!-- Title -->
            <div class="p-6 border-b border-gray-100">
                <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <i class="fa-solid fa-heart text-red-500"></i> Tempat Favorit Saya
                </h1>
                <p class="text-xs text-gray-400 mt-0.5">Daftar tempat nongkrong yang sudah kamu simpan ke akun pribadi.</p>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full border-collapse text-left text-sm text-gray-500">
                    <thead class="bg-gray-50 text-xs font-bold uppercase tracking-wider text-gray-400 border-b border-gray-100">
                        <tr>
                            <th scope="col" class="px-6 py-4">ID</th>
                            <th scope="col" class="px-6 py-4">Nama Tempat</th>
                            <th scope="col" class="px-6 py-4">Alamat</th>
                            <th scope="col" class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 border-t border-gray-100">
                        <tr th:each="favorit : ${favoritList}" class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 font-semibold text-gray-900" th:text="${favorit.id_favorit}"></td>
                            <td class="px-6 py-4 font-bold text-gray-800" th:text="${favorit.tempat.nama_tempat}"></td>
                            <td class="px-6 py-4 text-gray-500" th:text="${favorit.tempat.alamat}"></td>
                            <td class="px-6 py-4 text-center">
                                <a th:href="@{'/favorit/hapus/' + ${favorit.id_favorit}}" onclick="return confirm('Hapus dari favorit?')" class="bg-red-50 hover:bg-red-500 text-red-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-all inline-flex items-center gap-1">
                                    <i class="fa-solid fa-trash-can text-[11px]"></i> Hapus
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

</body>
</html>
