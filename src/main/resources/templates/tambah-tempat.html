<!DOCTYPE html>
<html>
<head>
    <title>Tambah Tempat</title>
</head>
<body>

<h1>Tambah Tempat Nongkrong</h1>

<form action="/tempat/simpan" method="post">

    <label>Nama Tempat</label>
    <br>
    <input type="text" name="nama_tempat" required>
    <br><br>

    <label>Alamat</label>
    <br>
    <input type="text" name="alamat" required>
    <br><br>

    <label>Deskripsi</label>
    <br>
    <textarea name="deskripsi"></textarea>
    <br><br>

    <label>Kategori</label>
    <br>
    <input type="text" name="kategori">
    <br><br>

    <label>Jam Buka</label>
    <br>
    <input type="text" name="jam_buka">
    <br><br>

    <label>Jam Tutup</label>
    <br>
    <input type="text" name="jam_tutup">
    <br><br>

    <label>Foto</label>
    <br>
    <input type="text" name="foto">
    <br><br>

    <button type="submit">
        Simpan Tempat
    </button>

</form>

<br>

<a href="/tempat">
    Lihat Semua Tempat
</a>

</body>
</html>
